<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Requests Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px; background: #f5f5f5; color: #333;
        }
        h2 { margin-bottom: 8px; color: #1a1a2e; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 14px; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .btn {
            padding: 12px 18px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; color: white; font-weight: 500;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-blue { background: #2196F3; }
        .btn-orange { background: #FF9800; }
        .btn-red { background: #F44336; }
        .btn-green { background: #4CAF50; }
        .btn-purple { background: #9C27B0; }
        .btn-teal { background: #009688; }
        .section { margin-bottom: 20px; }
        .section-title { font-size: 13px; color: #999; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px; }
        #output {
            margin-top: 16px; padding: 12px; background: white;
            border-radius: 8px; min-height: 100px; font-family: monospace;
            font-size: 12px; white-space: pre-wrap; border: 1px solid #e0e0e0;
            max-height: 300px; overflow-y: auto;
        }
    </style>
</head>
<body>
    <h2>Network Requests Demo</h2>
    <p class="subtitle">Open DevTools Network tab to inspect requests</p>

    <div class="section">
        <div class="section-title">Fetch API</div>
        <div class="btn-group">
            <button class="btn btn-blue" onclick="getRequest()">GET Request</button>
            <button class="btn btn-green" onclick="postRequest()">POST Request</button>
            <button class="btn btn-red" onclick="failingRequest()">404 Request</button>
            <button class="btn btn-orange" onclick="slowRequest()">Slow Request (3s)</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">Advanced</div>
        <div class="btn-group">
            <button class="btn btn-purple" onclick="parallelRequests()">5 Parallel Requests</button>
            <button class="btn btn-teal" onclick="xhrRequest()">XMLHttpRequest</button>
            <button class="btn btn-blue" onclick="headersRequest()">Custom Headers</button>
            <button class="btn btn-red" onclick="networkError()">Network Error</button>
        </div>
    </div>

    <div id="output">Waiting for requests...</div>

    <script>
        const output = document.getElementById('output');
        function log(msg) {
            output.textContent += '\n' + new Date().toLocaleTimeString() + ' | ' + msg;
            output.scrollTop = output.scrollHeight;
        }

        async function getRequest() {
            log('GET /posts/1 ...');
            try {
                const res = await fetch('https://jsonplaceholder.typicode.com/posts/1');
                const data = await res.json();
                log('200 OK - Title: "' + data.title.substring(0, 40) + '..."');
            } catch (e) {
                log('FAILED - ' + e.message);
            }
        }

        async function postRequest() {
            log('POST /posts ...');
            try {
                const res = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: 'Debug Demo Post',
                        body: 'This post was created from the WebView debug demo.',
                        userId: 1
                    })
                });
                const data = await res.json();
                log('201 Created - ID: ' + data.id);
            } catch (e) {
                log('FAILED - ' + e.message);
            }
        }

        async function failingRequest() {
            log('GET /posts/99999 ...');
            try {
                const res = await fetch('https://jsonplaceholder.typicode.com/posts/99999');
                log(res.status + ' ' + res.statusText + ' - Check Network tab for details');
            } catch (e) {
                log('FAILED - ' + e.message);
            }
        }

        async function slowRequest() {
            log('GET /delay/3 ... (will take ~3 seconds)');
            try {
                const start = performance.now();
                const res = await fetch('https://httpbin.org/delay/3');
                const elapsed = ((performance.now() - start) / 1000).toFixed(1);
                log('200 OK - Took ' + elapsed + 's. Check timing in Network tab!');
            } catch (e) {
                log('FAILED - ' + e.message);
            }
        }

        async function parallelRequests() {
            log('Firing 5 parallel requests...');
            const urls = [
                'https://jsonplaceholder.typicode.com/posts/1',
                'https://jsonplaceholder.typicode.com/posts/2',
                'https://jsonplaceholder.typicode.com/users/1',
                'https://jsonplaceholder.typicode.com/comments/1',
                'https://jsonplaceholder.typicode.com/todos/1'
            ];
            try {
                const results = await Promise.all(urls.map(url => fetch(url)));
                const statuses = results.map(r => r.status);
                log('All 5 done! Statuses: [' + statuses.join(', ') + '] - Check waterfall in Network tab');
            } catch (e) {
                log('FAILED - ' + e.message);
            }
        }

        function xhrRequest() {
            log('XHR GET /albums/1 ...');
            const xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://jsonplaceholder.typicode.com/albums/1');
            xhr.onload = function() {
                const data = JSON.parse(xhr.responseText);
                log('XHR 200 OK - Album: "' + data.title + '"');
            };
            xhr.onerror = function() {
                log('XHR FAILED');
            };
            xhr.send();
        }

        async function headersRequest() {
            log('GET with custom headers...');
            try {
                const res = await fetch('https://httpbin.org/headers', {
                    headers: {
                        'X-Debug-Demo': 'true',
                        'X-Request-ID': 'demo-' + Date.now(),
                        'Accept': 'application/json'
                    }
                });
                const data = await res.json();
                log('200 OK - Check request headers in Network tab');
            } catch (e) {
                log('FAILED - ' + e.message);
            }
        }

        async function networkError() {
            log('GET https://does-not-exist.invalid/ ...');
            try {
                await fetch('https://does-not-exist.invalid/api/test');
                log('Unexpected success');
            } catch (e) {
                log('Network Error: ' + e.message + ' - Check failed request in Network tab');
            }
        }

        console.log('Network Requests demo loaded. Use Network tab to inspect traffic.');
    </script>
</body>
</html>
